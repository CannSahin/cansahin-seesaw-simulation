<!DOCTYPE html>
<html lang="en">

<head>
    <title>Seesaw Simulation</title>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <div class="info">
            <h1>Seesaw Simulation</h1>
            <div class="weight">
                <div>Left: <span id="left-weight">0</span> kg</div>
                <div>Right: <span id="right-weight">0</span> kg</div>
            </div>
            <div class="app-card">
                <div class="stats">
                </div>
                <div class="seesaw-wrapper">
                    <div id="seesaw-plank"></div>
                    <div class="pivot"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
