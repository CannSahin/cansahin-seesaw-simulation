<!DOCTYPE html>
<html lang="en">

<head>
    <title>Seesaw Simulation</title>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <div class="info">
            <div style="display: flex; justify-content: center; align-items: center;">
                <h1>Seesaw Simulation</h1>
            </div>
            <div class="app-card">
                <div class="stat-info">
                    <div id="left-stat">Left Weight: <span id="left-weight">0</span> kg</div>
                    <div id="right-stat">Right Weight: <span id="right-weight">0</span> kg</div>

                    <div id="next-stat">Next Weight: <span id="next-weight-box">0</span> kg</div>
                    <div id="tilt-stat">Tilt Angle: <span id="tilt-angle">0</span>°</div>
                </div>
                <div><button id="reset-btn" class="btn-danger">Reset</button></div>
                <div class="seesaw-wrapper">
                    <div id="seesaw-plank"></div>
                    <div class="pivot"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
